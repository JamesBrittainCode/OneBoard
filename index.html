<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneBoard Quick Access</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #181b20;
        --muted: #616a75;
        --border: #e4e7ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: 'Avenir Next', 'Segoe UI', sans-serif;
        background: radial-gradient(circle at 20% 0%, #fef2ea, transparent 30%),
          radial-gradient(circle at 100% 100%, #eaf4ff, transparent 30%),
          var(--bg);
        color: var(--text);
      }

      .panel {
        width: min(560px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 28px;
        box-shadow: 0 12px 28px rgba(15, 22, 31, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 6vw, 3rem);
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
      }

      .actions {
        display: grid;
        gap: 10px;
      }

      a {
        display: block;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 12px 16px;
        color: inherit;
        text-decoration: none;
        background: #fff;
      }

      a.primary {
        background: #181b20;
        border-color: #181b20;
        color: #fff;
      }

      .tiny {
        margin-top: 14px;
        font-size: 0.9rem;
      }

      code {
        background: #f1f3f6;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>OneBoard</h1>
      <p>Quick launcher for Teacher and Student views.</p>
      <div class="actions">
        <a class="primary" href="http://localhost:3000/teacher">Open Teacher Dashboard</a>
        <a href="http://localhost:3000/student">Open Student Join</a>
      </div>
    </main>
  </body>
</html>
