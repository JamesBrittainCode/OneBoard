services:
  - type: web
    name: oneboard-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --workspaces --include-workspace-root
    startCommand: npm run start --workspace server
    healthCheckPath: /health
    envVars:
      - key: CLIENT_ORIGIN
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: ALLOW_VERCEL_PREVIEW
        value: "true"
    disk:
      name: oneboard-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
